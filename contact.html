<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact - Patricia Kpor Enam | Personal Portfolio</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a class="brand" href="index.html">PREETY PAT'S PORTFOLIO</a>
      <button class="nav-toggle" aria-label="Open navigation">
        <span></span>
        <span></span>
        <span></span>
      </button>
      <nav class="site-nav" aria-label="Primary navigation">
        <a href="about.html">About</a>
        <a href="projects.html">Projects</a>
        <a href="skills.html">Skills</a>
        <a href="contact.html">Contact</a>
      </nav>
    </div>
  </header>

  <main>
    <section class="section contact-section">
      <div class="container contact-grid">
        <div>
          <p class="section-label">Contact</p>
          <h2>Let's build something together.</h2>
          <p>Reach out to discuss a project, collaboration, or to learn more about my work.</p>
          <p class="contact-details">
            <span class="contact-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M3 5.5C3 4.672 3.672 4 4.5 4h15c.828 0 1.5.672 1.5 1.5v13c0 .828-.672 1.5-1.5 1.5h-15A1.5 1.5 0 0 1 3 18.5v-13Z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="m4.5 5.5 7.5 5 7.5-5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </span>
            <span>Email:</span>
            <a href="mailto:patriciakpor32@gmail.com">patriciakpor32@gmail.com</a>
          </p>
          <p class="contact-details">
            <span class="contact-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M21 16.5c-1.12 0-2.29-.18-3.5-.53a2 2 0 0 0-2.04.54l-1.5 1.5a15.05 15.05 0 0 1-7.18-7.18l1.5-1.5a2 2 0 0 0 .54-2.04A17.01 17.01 0 0 0 7.5 3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M3 3.5h5.5a1 1 0 0 1 1 1V9" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </span>
            <span>Phone:</span>
            0537979920 or 0505181509
          </p>
        </div>
        <form class="contact-form" onsubmit="handleContactSubmit(event)">
          <label>
            Name
            <input type="text" name="name" placeholder="Your name" required />
          </label>
          <label>
            Email
            <input type="email" name="email" placeholder="your@email.com" required />
          </label>
          <label>
            Message
            <textarea name="message" rows="5" placeholder="Tell me about your project" required></textarea>
          </label>
          <button type="submit" class="button primary">Send Message</button>
          <p id="contactStatus" class="status-message" aria-live="polite"></p>
        </form>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <p>© 2026 PatDav. Crafted with care.</p>
      <div class="footer-links">
        <a href="index.html">Home</a>
        <a href="projects.html">Projects</a>
      </div>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
